name: the_seed
description: A custom universal Flutter starter package for world-building. Based on VGV Core.
repository: https://github.com/codegeoss/the_seed
version: 0.1.0+1

environment:
  mason: ">=0.1.0-dev.26 <0.7.0"

vars:
  project_name:
    type: string
    description: The project name (snake_case)
    default: my_world
    prompt: What is the name of your New World?
  org_name:
    type: string
    description: The organization name (e.g., com.seed)
    default: com.seed
    prompt: Enter your Organization Name
  application_id:
    type: string
    description: >-
      The application id on Android, Bundle ID on iOS. 
      If omitted, value will be: org_name.project_name
    prompt: Enter the Application ID (e.g., com.test.ke)
  description:
    type: string
    description: A short project description
    default: A World built with The Seed.
    prompt: Describe this World
  project_folder:
    type: string
    description: The main folder that will contain your new Flutter project
    default: projects
    prompt: Name of the folder to generate the world into